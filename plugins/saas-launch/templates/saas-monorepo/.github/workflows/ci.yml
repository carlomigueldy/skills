name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Well-known Supabase local-dev demo anon key (see apps/pwa/.env.example) —
  # only valid against the local `supabase start` stack this workflow boots,
  # never a hosted project. Safe to keep in plain env, not secrets.
  VITE_SUPABASE_URL: http://127.0.0.1:54321
  VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0

jobs:
  # Mirrors SCAFFOLD.md §4 "Verification commands" exactly — that doc is the
  # source of truth for what "green" means for this template; keep both in
  # sync if either changes.
  verify:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, build (turbo)
        run: pnpm turbo run lint typecheck build

      - name: Unit / integration tests (turbo -> Vitest)
        run: pnpm turbo run test

  e2e:
    name: Playwright E2E (local Supabase)
    runs-on: ubuntu-latest
    needs: verify
    # Scaffold default: advisory until a real product's fixtures/seed data
    # stabilize this suite. Flip to required (remove this line) once
    # apps/pwa's E2E coverage is trustworthy for this product.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter pwa exec playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (applies supabase/migrations)
        run: supabase start

      - name: Run Playwright E2E
        run: pnpm --filter pwa test:e2e

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/pwa/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
