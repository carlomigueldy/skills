<!doctype html>
<html lang="{{PRIMARY_LOCALE}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="{{PRODUCT_DESCRIPTION}}" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <!-- vite-plugin-pwa injects the manifest link automatically at build time
         via registerType: 'autoUpdate' in vite.config.ts; no manual <link
         rel="manifest"> needed here. -->
    <title>{{PRODUCT_NAME}}</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
