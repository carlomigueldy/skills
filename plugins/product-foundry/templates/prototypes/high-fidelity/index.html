<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{PRODUCT_NAME}} high-fidelity prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-slate-950 p-4 font-sans text-slate-950 sm:p-8">
    <main class="mx-auto max-w-5xl rounded-3xl bg-slate-50 p-6 shadow-2xl sm:p-10">
      <header class="flex flex-wrap items-center justify-between gap-4"><span class="font-bold tracking-tight">{{PRODUCT_NAME}}</span><nav class="flex flex-wrap gap-2" aria-label="Prototype state navigation"><button data-state="loading" class="rounded-full border px-3 py-2">Loading</button><button data-state="empty" class="rounded-full border px-3 py-2">Empty</button><button data-state="error" class="rounded-full border px-3 py-2">Error</button><button data-state="permission" class="rounded-full border px-3 py-2">Permission</button><button data-state="success" class="rounded-full border px-3 py-2">Success</button><button data-state="validation" class="rounded-full border px-3 py-2">Validation</button></nav></header>
      <section id="view" class="mt-12 rounded-2xl bg-white p-6 shadow-sm" aria-live="polite" aria-atomic="true"></section>
    </main>
    <script>
      const views = {
        loading: '<p class="font-semibold text-violet-700">Preparing your workspace</p><h1 class="mt-3 text-4xl font-black">One moment.</h1>',
        empty: '<h1 class="text-3xl font-black">Start with a first workspace</h1><p class="mt-3 text-slate-600">No workspaces exist yet.</p>',
        error: '<h1 class="text-3xl font-black">That did not work</h1><button class="mt-4 rounded-full bg-violet-600 px-4 py-2 font-semibold text-white">Try again</button>',
        permission: '<h1 class="text-3xl font-black">Access required</h1><p class="mt-3 text-slate-600">Ask an owner to grant workspace access.</p>',
        success: '<h1 class="text-3xl font-black">Workspace created</h1><p class="mt-3 text-slate-600">Continue to the guided next step.</p>',
        validation: '<h1 class="text-3xl font-black">Name your workspace</h1><label class="mt-4 block">Workspace name <input class="mt-1 block w-full rounded border border-red-600 p-2" aria-invalid="true" aria-describedby="name-error"></label><p id="name-error" class="mt-2 text-red-700">A workspace name is required.</p>'
      };
      const view = document.querySelector('#view');
      document.querySelectorAll('[data-state]').forEach((button) => button.addEventListener('click', () => { view.innerHTML = views[button.dataset.state]; view.querySelector('button, input')?.focus(); }));
      document.querySelector('[data-state="loading"]').click();
    </script>
  </body>
</html>
