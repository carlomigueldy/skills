name: Validate

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate marketplace + plugin manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all JSON files parse
        run: |
          set -euo pipefail
          find . -name '*.json' -not -path '*/node_modules/*' -not -path './.git/*' \
            -print0 | xargs -0 -n1 jq empty

      - name: Install validation dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Check skills mirror is in sync
        run: python3 scripts/sync-skills.py --check

      - name: Validate marketplace
        run: claude plugin validate .

      - name: Validate saas-launch plugin
        run: claude plugin validate ./plugins/saas-launch

      - name: Validate product-foundry plugin
        run: claude plugin validate ./plugins/product-foundry

      - name: Validate product-foundry Codex native manifest
        run: python3 scripts/validate_product_foundry.py --codex-manifest-only ./plugins/product-foundry/.codex-plugin/plugin.json

      - name: Validate product-foundry package contract
        run: |
          python3 -m unittest -v tests.test_product_foundry_contract
          python3 scripts/validate_product_foundry.py .

      - name: Smoke-test product-foundry package layout
        run: |
          package_dir=$(mktemp -d)
          scripts/package-plugin.py product-foundry --output-dir "$package_dir"
